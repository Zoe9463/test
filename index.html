<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>术数天赋测试</title>

<style>

body{
    margin:0;
    background:#f5f3ef;
    color:#222;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

.container{
    max-width:720px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
    font-size:36px;
    margin-top:40px;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:30px;
}

.intro{
    background:white;
    border-radius:16px;
    padding:24px;
    box-shadow:0 2px 12px rgba(0,0,0,.05);
}

.start-btn{
    width:100%;
    padding:16px;
    margin-top:20px;
    border:none;
    border-radius:12px;
    background:#222;
    color:white;
    font-size:18px;
    cursor:pointer;
}

.progress-wrap{
    display:none;
    margin-top:20px;
}

.progress{
    height:10px;
    background:#ddd;
    border-radius:999px;
    overflow:hidden;
}

.progress-bar{
    height:100%;
    width:0%;
    background:#8b6b3f;
}

.question-card{
    display:none;
    background:white;
    padding:24px;
    border-radius:16px;
    margin-top:20px;
    box-shadow:0 2px 12px rgba(0,0,0,.05);
}

.question-number{
    color:#888;
    margin-bottom:10px;
}

.question-title{
    font-size:24px;
    margin-bottom:20px;
}

.option{
    border:1px solid #ddd;
    border-radius:12px;
    padding:16px;
    margin-bottom:12px;
    cursor:pointer;
    transition:.2s;
}

.option:hover{
    border-color:#8b6b3f;
}

.option.selected{
    border:2px solid #8b6b3f;
    background:#faf6ef;
}

.next-btn{
    width:100%;
    padding:16px;
    border:none;
    border-radius:12px;
    background:#222;
    color:white;
    font-size:18px;
    margin-top:20px;
    cursor:pointer;
}

.result{
    display:none;
    background:white;
    margin-top:20px;
    padding:24px;
    border-radius:16px;
}

.rank{
    padding:18px;
    margin-bottom:15px;
    border:1px solid #eee;
    border-radius:12px;
}

.rank-title{
    font-size:22px;
    font-weight:bold;
    margin-bottom:8px;
}

</style>
</head>

<body>

<div class="container">

    <h1>术数天赋测试</h1>

    <div class="subtitle">
        共12题 · 测试你的玄学天赋路线
    </div>

    <div id="intro" class="intro">

        <p>
            浩瀚星河，易理万千。
            从西方的黄道十二宫到东方的四柱八字，风水六爻，人类从未停止过对命运规律的探索。
        </p>

        <p>
            有人天生对严谨的逻辑推演敏感，适合深挖大六壬；
            有人直觉惊人，注定与塔罗神谕共鸣。
            是擅长六爻问卦，还是更具塔罗星盘的灵性？
        </p>

        <p>
            玄学术数五花八门，哪一条才是属于你的“天赋之路”？
            接下来的几道题，将带你剥开迷雾，找到真正契合你灵魂的术数系统。
            快来测测吧！
        

        </p>

        <button class="start-btn" onclick="startQuiz()">
            开始测试
        </button>

    </div>

    <div class="progress-wrap" id="progressWrap">

        <div id="progressText">
            第1题 / 共12题
        </div>

        <div class="progress">
            <div id="progressBar" class="progress-bar"></div>
        </div>

    </div>

    <div id="questionCard" class="question-card"></div>

    <div id="result" class="result"></div>

</div>

<script>

const questions = [

{
title:"关于文化传承与时代审美，你的底色是？",
options:[
"A. 绝对复古派 华夏正统，祖法不可废。极其推崇古人的智慧，认为现代文明或西方理论只是旁门左道，唯有厚重的历史积淀才值得托付。",
"B. 传统改良派 本土为尊，取精用弘。坚守东方逻辑，但愿意用现代视角重新解读古典。尊重传统，但也追求逻辑的自洽与严谨。",
"C. 兼容并蓄派 时代在变，玄学也像科学一样与时俱进。不分中西，好用就行。认同传统在其产生的年代有意义，但文明的前进不可阻挡，创造新的活力，而不是一味守旧。",
"D. 效能演化派 优胜劣汰，实力至上。毫无门户之见，效率高、出成果、易传播就是好东西。厌恶陈腐的规矩，追求最前沿的进步。"
]
},

{
title:"到一个陌生环境时，你通常最先注意到什么？",
options:[
"A. 这个地方的布局、秩序、运行方式",
"B. 某些特别抓人的细节、颜色、符号或画面",
"C. 我说不上来，但一进到一个空间中就会有个整体感觉",
"D. 气氛，有没有压迫感、舒服不舒服、磁场顺不顺"
]
},

{
title:"如果你很在意一件事，但又不知道结果会怎样，你更可能怎么做？",
options:[
"A. 去搜集信息，分析来龙去脉",
"B. 反复想某些细节，觉得关键藏在里面",
"C. 直接想办法先得到一个结论",
"D. 先放一放，等感觉、梦境或某种提示自己浮出来"
]
},

{
title:"你会通过什么评判一个新认识的人？",
options:[
"A. 说话做事有没有逻辑条理",
"B. 某些小动作、表情、细节特别说明问题",
"C. 第一感觉，基本一见面就有判断了",
"D. 是否投机，气场是否相合，往往比说了什么更重要"
]
},

{
title:"如果现在你有机会向造物主问一个问题，你最想知道哪种答案？",
options:[
"A. 宇宙的真理",
"B. 命运的来因",
"C. 生命的意义",
"D. 是否有来生"
]
},

{
title:"最近心情不太好约了最好的朋友出来小聚，你最想先聊哪一个？",
options:[
"A. 未来的人生轨迹，职业规划",
"B. 眼前当下的这个选择，我该如何抉择",
"C. 别人是怎么看待我的",
"D. 经历的不顺，是否是我哪里决策出错，我应该如何调整一下自己"
]
},

{
title:"你走进一扇陌生的门，门后必须有一样东西，你最希望看到什么？",
options:[
"A. 一面会说话的镜子",
"B. 一张写满符号的旧地图",
"C. 一盏一直燃着的灯",
"D. 一只正在看着你的动物"
]
},

{
title:"如果人生是一场考试，你最想提前知道哪一部分答案？",
options:[
"A. 我到底是什么样的人",
"B. 今年会发生什么",
"C. 当下怎么做才最有利",
"D. 我这一生大的格局和走向"
]
},

{
title:"如果给你一项超能力，你更想拥有哪一种？",
options:[
"A. 看穿人心",
"B. 实时感知危险或机会",
"C. 改变环境",
"D. 预知未来"
]
},

{
title:"如果你的人生被拍成电影，你希望它更像哪一种？",
options:[
"A. 一部自我觉醒的成长片",
"B. 一部充满巧合和预兆的悬疑片",
"C. 一部运筹帷幄、反败为胜的权谋片",
"D. 一部关于天命、时代与大势的史诗片"
]
},

{
title:"请选择最吸引你的图案",
imageQuestion:true,
questionImage:"图片1.png",
options:[
{key:"A",image:"A.png"},
{key:"B",image:"B.png"},
{key:"C",image:"C.png"},
{key:"D",image:"D.png"}
]
},

{
title:"当前的创业方向做了很久都没有明显成果，且你当前的资源足以支持你的选择时，你会怎样处理？",
options:[
"A. 继续坚持。同时复盘哪里可以优化。没有实证证明这个方向有问题，那就是我还不够努力。",
"B. 会怀疑自己的选择或能力，但只要还有希望就会再坚持看看。",
"C. 热情迅速下降，维持当下项目的同时开始尝试别的选择。",
"D. 快速停掉及时止损，选择比坚持重要得多。"
]
}

];
    
const systems = [
"星盘",
"占星骰子",
"塔罗",
"雷诺曼",
"神谕卡",
"印度占卜",
"灵摆",
"道",
"巫(出马仙)",
"八字",
"六爻(梅花易数)",
"奇门",
"大六壬",
"小六壬",
"风水",
"七政四余",
"紫微",
"皇极经世",
"观音",
"掷筊",
"其他"
];
    
let currentQuestion = 0;
let answers = [];

function startQuiz(){

    document.getElementById("intro").style.display="none";

    document.getElementById("progressWrap").style.display="block";

    renderQuestion();

}

function renderQuestion(){

    let q = questions[currentQuestion];

    document.getElementById("progressText").innerHTML=
    `第 ${currentQuestion+1} 题 / 共 ${questions.length} 题`;

    document.getElementById("progressBar").style.width=
    ((currentQuestion+1)/questions.length*100)+"%";

    let html=`

    <div class="question-number">
    Question ${currentQuestion+1}
    </div>

    <div class="question-title">
    ${q.title}
    </div>

    `;

if(q.imageQuestion){

    html += `
    <div style="margin-bottom:20px;text-align:center;">
        <img src="${q.questionImage}"
             style="max-width:100%;border-radius:12px;">
    </div>

    <div style="
        display:grid;
        grid-template-columns:repeat(4,1fr);
        gap:8px;
    ">
    `;

    q.options.forEach((item,index)=>{

        html += `
        <div class="option"
             onclick="selectOption(${index},this)">

            <img src="${item.image}"
                 style="
                 width:100%;
                 max-height:120px;
                 object-fit:contain;
                 border-radius:8px;
                 display:block;
                 ">

            <div style="
                text-align:center;
                margin-top:8px;
                font-weight:bold;
            ">
                ${item.key}
            </div>

        </div>
        `;
    });

    html += `</div>`;

}else{

    q.options.forEach((item,index)=>{

        html += `
        <div class="option"
             onclick="selectOption(${index},this)">
            ${item}
        </div>
        `;
    });

}

    html+=`

    <button class="next-btn"
    onclick="nextQuestion()">

    下一题

    </button>

    `;

    document.getElementById("questionCard").innerHTML=html;
    document.getElementById("questionCard").style.display="block";

}

function selectOption(index,el){

    document
    .querySelectorAll(".option")
    .forEach(o=>o.classList.remove("selected"));

    el.classList.add("selected");

    answers[currentQuestion]=index;

}

function nextQuestion(){

    if(answers[currentQuestion]==null){

        alert("请选择一个选项");

        return;
    }

    currentQuestion++;

    if(currentQuestion>=questions.length){

        showResult();

        return;
    }

    renderQuestion();

}
function showResult(){

```
document.getElementById("questionCard").style.display="none";
document.getElementById("progressWrap").style.display="none";

const systems = Object.keys(scoringData);

let results = [];

systems.forEach(name=>{

    let total = 0;

    answers.forEach((answer,index)=>{

        const option =
            ["A","B","C","D"][answer];

        const key =
            `Q${index+1}${option}`;

        total +=
            scoringData[name][key] || 0;

    });

    results.push({
        name:name,
        score:total
    });

});

results.sort(
    (a,b)=>b.score-a.score
);

const medals = ["🥇","🥈","🥉"];

let html = `
    <h2>你的术数天赋排行</h2>
`;

for(let i=0;i<3;i++){

    html += `
    <div class="rank">

        <div class="rank-title">
            ${medals[i]} ${results[i].name}
        </div>

        匹配得分 ${results[i].score}

    </div>
    `;
}

document.getElementById("result").innerHTML = html;
document.getElementById("result").style.display="block";
```

}

</script>

</body>
</html>
